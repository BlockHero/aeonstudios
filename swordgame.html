<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Open World Slasher</title>
<style>
  body { margin:0; overflow:hidden; background:#0b0b0b; font-family:Arial; color:#fff; touch-action:none; }
  canvas { display:block; }
  #ui { position:fixed; top:10px; left:10px; z-index:10; font-size:14px; }.controls { position:fixed; bottom:20px; left:20px; z-index:20; } .stick { width:120px; height:120px; border:2px solid #555; border-radius:50%; position:relative; } .knob { width:40px; height:40px; background:#aaa; border-radius:50%; position:absolute; left:40px; top:40px; }

.actions { position:fixed; bottom:20px; right:20px; z-index:20; } .btn { width:60px; height:60px; background:#444; border-radius:50%; display:flex; align-items:center; justify-content:center; } </style>

</head>
<body>
<div id="ui">Slasher Mode • Survive</div>
<canvas id="game"></canvas><div class="controls">
  <div class="stick" id="stick"><div class="knob" id="knob"></div></div>
</div><div class="actions">
  <div class="btn" id="attack">⚔️</div>
</div><script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Player
const player = { x:0, y:0, vx:0, vy:0, angle:0, hp:100 };

// Sword
const sword = { angle:0, progress:0, swinging:false };

// Environment
const tiles = [];
for(let i=0;i<500;i++){
  tiles.push({ x:Math.random()*6000-3000, y:Math.random()*6000-3000, type:Math.random()>0.7?'sand':'grass' });
}

const trees = [];
for(let i=0;i<120;i++){
  trees.push({ x:Math.random()*6000-3000, y:Math.random()*6000-3000 });
}

const rocks = [];
for(let i=0;i<80;i++){
  rocks.push({ x:Math.random()*6000-3000, y:Math.random()*6000-3000, r:18 });
}

// Enemies (spawn waves)
const enemies = [];
function spawnEnemy(){
  const angle = Math.random()*Math.PI*2;
  const dist = 500 + Math.random()*300;
  enemies.push({
    x: player.x + Math.cos(angle)*dist,
    y: player.y + Math.sin(angle)*dist,
    hp:50,
    speed:1 + Math.random()*0.5
  });
}
setInterval(spawnEnemy, 1500);

const dmgTexts = [];

// Joystick
const stick = document.getElementById('stick');
const knob = document.getElementById('knob');
let joy = {x:0,y:0,active:false};

stick.addEventListener('touchstart', ()=>joy.active=true);
stick.addEventListener('touchmove', e=>{
  const rect = stick.getBoundingClientRect();
  const t = e.touches[0];
  let x = t.clientX - rect.left - 60;
  let y = t.clientY - rect.top - 60;
  const d = Math.hypot(x,y);
  if(d>50){ x*=50/d; y*=50/d; }
  joy.x = x/50; joy.y = y/50;
  knob.style.left = (x+40)+'px';
  knob.style.top = (y+40)+'px';
});
stick.addEventListener('touchend', ()=>{
  joy.active=false; joy.x=0; joy.y=0;
  knob.style.left='40px'; knob.style.top='40px';
});

// Attack
const attackBtn = document.getElementById('attack');
attackBtn.addEventListener('touchstart', ()=>{
  sword.swinging = true;
  sword.progress = 0;
});

function update(){
  // Movement
  if(joy.active){
    player.vx += joy.x * 0.6;
    player.vy += joy.y * 0.6;
  }

  player.vx *= 0.9;
  player.vy *= 0.9;
  player.x += player.vx;
  player.y += player.vy;

  if(Math.hypot(player.vx,player.vy)>0.1){
    player.angle = Math.atan2(player.vy,player.vx);
  }

  // Enemy movement (swarm)
  enemies.forEach(e=>{
    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const dist = Math.hypot(dx,dy);

    e.x += dx/dist * e.speed;
    e.y += dy/dist * e.speed;

    if(dist < 25){ player.hp -= 0.2; }
  });

  // Sword slash
  if(sword.swinging){
    sword.progress += 0.2;
    sword.angle = player.angle + (sword.progress * Math.PI);

    const sx = player.x + Math.cos(sword.angle)*50;
    const sy = player.y + Math.sin(sword.angle)*50;

    enemies.forEach(e=>{
      const dx = sx - e.x;
      const dy = sy - e.y;
      const dist = Math.hypot(dx,dy);

      if(dist<30){
        const dmg = Math.floor(Math.random()*10)+10;
        e.hp -= dmg;
        e.x += dx/dist * 15;
        e.y += dy/dist * 15;
        dmgTexts.push({ x:e.x, y:e.y, val:dmg, life:30 });
      }
    });

    if(sword.progress>=1) sword.swinging=false;
  }

  // Cleanup
  for(let i=enemies.length-1;i>=0;i--){
    if(enemies[i].hp<=0) enemies.splice(i,1);
  }

  dmgTexts.forEach(t=>{ t.y -= 0.8; t.life--; });
  for(let i=dmgTexts.length-1;i>=0;i--){
    if(dmgTexts[i].life<=0) dmgTexts.splice(i,1);
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Tiles
  tiles.forEach(t=>{
    ctx.fillStyle = t.type==='grass' ? '#1f5' : '#aa7';
    ctx.fillRect(t.x-player.x+canvas.width/2, t.y-player.y+canvas.height/2, 40, 40);
  });

  // Trees
  ctx.fillStyle='#0a3';
  trees.forEach(t=>{
    ctx.beginPath();
    ctx.arc(t.x-player.x+canvas.width/2, t.y-player.y+canvas.height/2, 12,0,Math.PI*2);
    ctx.fill();
  });

  // Rocks
  ctx.fillStyle='#666';
  rocks.forEach(r=>{
    ctx.beginPath();
    ctx.arc(r.x-player.x+canvas.width/2, r.y-player.y+canvas.height/2, r.r,0,Math.PI*2);
    ctx.fill();
  });

  // Enemies
  enemies.forEach(e=>{
    ctx.fillStyle='red';
    ctx.fillRect(e.x-player.x+canvas.width/2-10, e.y-player.y+canvas.height/2-10,20,20);
  });

  // Player
  ctx.fillStyle='cyan';
  ctx.fillRect(canvas.width/2-10, canvas.height/2-10,20,20);

  // Sword
  if(sword.swinging){
    ctx.strokeStyle='yellow';
    ctx.lineWidth=5;
    ctx.beginPath();
    ctx.moveTo(canvas.width/2, canvas.height/2);
    ctx.lineTo(canvas.width/2 + Math.cos(sword.angle)*50, canvas.height/2 + Math.sin(sword.angle)*50);
    ctx.stroke();
  }

  // Damage numbers
  ctx.fillStyle='orange';
  dmgTexts.forEach(t=>{
    ctx.fillText(t.val, t.x-player.x+canvas.width/2, t.y-player.y+canvas.height/2);
  });

  ctx.fillStyle='white';
  ctx.fillText('HP: '+Math.floor(player.hp),10,20);
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script></body>
</html>
